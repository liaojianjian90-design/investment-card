name: Investment Health Card 5.0 Monitor

on:
  push:
    paths:
      - "data/manual-trades.json"
      - "config/holdings.json"
  workflow_dispatch:
    inputs:
      test_email:
        description: "Send a test email"
        required: false
        type: boolean
        default: false
  schedule:
    # 5.0 仍保持 5 分钟检查一次，用于捕捉 BTC 急跌和数据异常。
    # 邮件本身由 repeatAlertHours、weekly structure id 和 oneTradePerDay 控制，不会每次都发送。
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: investment-health-card-monitor
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Run local self-check
        run: npm test

      - name: Run 5.0 monitor
        run: npm run monitor
        env:
          TEST_EMAIL: ${{ github.event.inputs.test_email || 'false' }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}

      - name: Commit generated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update investment health card data"
          file_pattern: "data/*.json"
