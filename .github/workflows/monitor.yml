name: Investment Monitor

on:
  workflow_dispatch:
    inputs:
      test_email:
        description: "Send a test email"
        required: false
        type: boolean
        default: false
  schedule:
    # GitHub Actions scheduled workflows can run at most once every 5 minutes.
    # Use off-hour minutes to reduce delay risk around the top of each hour.
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run monitor
        run: npm run monitor
        env:
          TEST_EMAIL: ${{ github.event.inputs.test_email || 'false' }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}

      - name: Commit generated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update investment monitor data"
          file_pattern: "data/*.json"
